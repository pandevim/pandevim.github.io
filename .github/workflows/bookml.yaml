on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compile with BookML
        uses: vlmantova/bookml-action@v1
        with:
          release: false

      - name: Stage site
        run: |
          mkdir -p site
          unzip -o index.zip -d site
          # If the zip extracts into a top-level "index/" folder, flatten it.
          if [ -d site/index ] && [ ! -f site/index.html ]; then
            mv site/index/* site/
            rmdir site/index
          fi
          cp index.pdf site/ 2>/dev/null || true
          ls -la site

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

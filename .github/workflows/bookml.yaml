on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compile with BookML
        uses: vlmantova/bookml-action@v1
        with:
          release: false

      - name: Inspect BookML output
        run: |
          echo "--- workspace ---"
          ls -la
          echo "--- aux/ ---"
          ls -la aux || true
          echo "--- aux/index/ ---"
          ls -la aux/index || true

      - name: Stage site
        run: |
          mkdir -p site
          cp -r aux/index/. site/
          cp aux/index.pdf site/ 2>/dev/null || true

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
